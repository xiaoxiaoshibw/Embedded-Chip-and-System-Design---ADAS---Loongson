# 行人横穿：极慢速前车（行人速度）横向移动，检验 class-aware AEB 触发
# 前车 class=3 (PEDESTRIAN)，TTC 乘子更宽松（2.0x），触发距离更远（40m）
name: pedestrian_cross
duration_s: 15.0
road:
  curvature: 0.0
ego:
  v0: 10.0
  lane_offset0: 0.0
lead:
  present: true
  gap0: 30.0
  v0: 1.5                  # 行人速度 ~1.5 m/s
  cls: 3                   # ACTOR_CLASS_PEDESTRIAN
  accel_profile:
    - {t: 0.0, a: 0.0}
  lateral_profile:         # 行人从右侧 (y=2.0) 横穿到左侧 (y=-2.0)
    - {t: 0.0, y: 2.0}
    - {t: 2.0, y: 1.5}
    - {t: 5.0, y: 0.0}
    - {t: 8.0, y: -1.5}
    - {t: 10.0, y: -2.0}
    - {t: 15.0, y: -2.0}
expect:
  collision: false
  min_gap_min: 2.0
  aeb_activations_min: 1   # 行人场景应触发 AEB
