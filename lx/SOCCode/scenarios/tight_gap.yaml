# 紧凑车距：初始车距仅 12m、自车更快，强制接近后检验 AEB 响应
name: tight_gap
duration_s: 15.0
road:
  curvature: 0.0
ego:
  v0: 10.0
  lane_offset0: 0.0
lead:
  present: true
  gap0: 12.0               # 紧凑初始车距
  v0: 5.0                  # 前车慢，自车快速接近
  accel_profile:
    - {t: 0.0, a: 0.0}
    - {t: 4.0, a: -3.0}    # 前车急刹
    - {t: 7.0, a: 0.0}
  lateral_profile:
    - {t: 0.0, y: 0.0}
expect:
  collision: false
  min_ttc_min: 0.3
  aeb_activations_min: 1
