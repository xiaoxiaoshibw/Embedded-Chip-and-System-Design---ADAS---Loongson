# 高速跟车：25 m/s (90 km/h) 下跟车，检验高速稳定性与安全距离
name: high_speed_follow
duration_s: 20.0
road:
  curvature: 0.0
ego:
  v0: 25.0
  lane_offset0: 0.0
lead:
  present: true
  gap0: 50.0               # 高速需要更大初始车距
  v0: 22.0                 # 前车略慢
  accel_profile:
    - {t: 0.0, a: 0.0}
    - {t: 8.0, a: -2.0}    # 前车开始减速
    - {t: 12.0, a: 0.0}
  lateral_profile:
    - {t: 0.0, y: 0.0}
expect:
  collision: false
  min_gap_min: 8.0
  lat_cte_rms_max: 0.5
  jerk_rms_max: 8.0
