# 静止前车接近：前车停止，自车低速接近，检验 AEB 制动与安全距离保持
# 注：OvertakeManager 需要自车也停止才触发（OVT_LEAD_LONG_STILL_S + ego 静止），
# 此场景测试接近静止前车时的制动行为，不测试超车状态机完整流程。
name: overtake_stopped
duration_s: 25.0
road:
  curvature: 0.0
ego:
  v0: 5.0
  lane_offset0: 0.0
lead:
  present: true
  gap0: 35.0
  v0: 0.0                  # 前车静止
  accel_profile:
    - {t: 0.0, a: 0.0}
  lateral_profile:
    - {t: 0.0, y: 0.0}
expect:
  collision: false
  min_gap_min: 1.0          # AEB 应在 1m 前停车（MIL 为理想模型，余量偏乐观）
  aeb_activations_min: 1    # 接近静止前车应触发 AEB
