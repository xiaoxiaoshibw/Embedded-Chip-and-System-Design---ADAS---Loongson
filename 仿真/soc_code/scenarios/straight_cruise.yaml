# 直道定速巡航：无前车，检验巡航稳定 + 居中 + 舒适
name: straight_cruise
duration_s: 25.0
road:
  curvature: 0.0          # 1/m，0 = 直道
ego:
  v0: 6.0                  # 自车初速 (m/s)
  lane_offset0: 0.3        # 初始横向偏移 (m)，检验 LKA 回正
lead:
  present: false
expect:
  collision: false
  lat_cte_rms_max: 0.35    # 横向偏移 RMS 上限 (m)
  jerk_rms_max: 3.0        # 纵向 jerk RMS 上限 (m/s^3)
  aeb_activations_max: 0   # 无前车不应触发 AEB
