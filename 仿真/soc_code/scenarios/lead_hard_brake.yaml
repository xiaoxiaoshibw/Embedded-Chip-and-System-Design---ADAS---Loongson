# 前车急刹：跟车中前车 -4 m/s^2 急减速，检验 AEB 不碰撞
name: lead_hard_brake
duration_s: 20.0
road:
  curvature: 0.0
ego:
  v0: 8.0
  lane_offset0: 0.0
lead:
  present: true
  gap0: 28.0               # 初始车距 (m)
  v0: 8.0
  accel_profile:           # 分段：t>=time 起施加 a (m/s^2)
    - {t: 0.0,  a: 0.0}
    - {t: 5.0,  a: -4.0}
    - {t: 8.5,  a: 0.0}
  lateral_profile:
    - {t: 0.0, y: 0.0}
expect:
  # 注：MIL 为零作动延迟理想模型，绝对车距偏乐观；安全以 collision:false +
  # min_ttc 为准，阈值按当前基线 + 余量标定，用于回归检测而非绝对达标。
  collision: false         # 硬安全门：不允许碰撞
  min_ttc_min: 0.5         # 基线 ~3.7，回归到危险接近即失败
  jerk_rms_max: 14.0
  aeb_activations_min: 1   # 应至少触发一次 AEB
