# 切入：前车初始偏在相邻车道，逐渐横移切入本车道，检验提前减速避撞
name: cut_in
duration_s: 18.0
road:
  curvature: 0.0
ego:
  v0: 9.0
  lane_offset0: 0.0
lead:
  present: true
  gap0: 16.0
  v0: 6.0                  # 切入车较慢
  accel_profile:
    - {t: 0.0, a: 0.0}
  lateral_profile:         # 横向 y 从 3.2m（邻道）渐变到 0（本车道）
    - {t: 0.0, y: 3.2}
    - {t: 3.0, y: 3.2}
    - {t: 6.0, y: 0.0}
    - {t: 18.0, y: 0.0}
expect:
  collision: false
  min_gap_min: 1.0
  jerk_rms_max: 16.0
  aeb_activations_min: 0   # 允许靠 ACC 平滑处理，不强制 AEB
