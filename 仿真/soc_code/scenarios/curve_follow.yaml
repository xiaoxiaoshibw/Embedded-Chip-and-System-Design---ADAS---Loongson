# 弯道跟车：恒定曲率弯道 + 前车匀速，检验弯道居中 + 不碰撞
name: curve_follow
duration_s: 25.0
road:
  curvature: 0.012         # 1/m，半径约 83m 的弯
ego:
  v0: 7.0
  lane_offset0: 0.0
lead:
  present: true
  gap0: 25.0
  v0: 7.0
  accel_profile:
    - {t: 0.0, a: 0.0}
  lateral_profile:
    - {t: 0.0, y: 0.0}
expect:
  collision: false
  min_gap_min: 5.0
  lat_cte_rms_max: 0.8     # 弯道横向 RMS（基线~0.63，留回归余量；MIL 模型有弯道稳态偏差）
  jerk_rms_max: 6.0
  aeb_activations_max: 0   # 匀速跟车不应触发 AEB
